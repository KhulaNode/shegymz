version: '3.8'

services:
  shegymz-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shegymz
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      # ── Yoco Payments
      - YOCO_SECRET_KEY=${YOCO_SECRET_KEY}
      - YOCO_WEBHOOK_SECRET=${YOCO_WEBHOOK_SECRET}
      - APP_BASE_URL=${APP_BASE_URL:-https://shegymz.com}
      - PAYMENTS_DATA_DIR=/app/data
      # ── Subscription pricing
      - NEXT_PUBLIC_SUBSCRIPTION_AMOUNT=${NEXT_PUBLIC_SUBSCRIPTION_AMOUNT:-399}
      # ── Email
      - PLUNK_API_KEY=${PLUNK_API_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
    volumes:
      - payments-data:/app/data
    networks:
      - shegymz-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # ports:
    #   - "3000:3000"

volumes:
  payments-data:
    driver: local

networks:
  shegymz-network:
    driver: bridge

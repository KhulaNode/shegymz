services:
  shegymz-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shegymz-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PAYSTACK_SECRET_KEY
      - PAYSTACK_PLAN_CODE
      - APP_BASE_URL=${APP_BASE_URL:-https://shegymz.com}
      - NEXT_PUBLIC_SUBSCRIPTION_AMOUNT=${NEXT_PUBLIC_SUBSCRIPTION_AMOUNT:-399}
      - PLUNK_API_KEY=${PLUNK_API_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - CONTACT_EMAIL=${CONTACT_EMAIL:-admin@shegymz.com}
      - NEXT_PUBLIC_CONTACT_EMAIL=${NEXT_PUBLIC_CONTACT_EMAIL:-admin@shegymz.com}
    networks:
      - shegymz-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  shegymz-network:
    driver: bridge
